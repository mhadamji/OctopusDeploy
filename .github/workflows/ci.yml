name: ci

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore OctopusDeploy.slnx

      - name: Build
        run: dotnet build OctopusDeploy.slnx -c Release --no-restore

      - name: Test
        run: dotnet test OctopusDeploy.slnx -c Release --no-build